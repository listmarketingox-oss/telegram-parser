{% extends "base.html" %}
{% block title %}Поиск — TG Parser{% endblock %}
{% block content %}
<h2>Поиск по каналам</h2>

<div class="card">
    <form id="searchForm">
        <div class="search-main">
            <input type="text" id="searchKeyword" placeholder="Введите ключевое слово или фразу..." class="search-input" required>
            <button type="submit" class="btn btn-primary btn-lg" id="searchBtn">Искать</button>
        </div>
        <div class="search-options">
            <div class="search-option">
                <label class="form-label">Период:</label>
                <div class="form-inline">
                    <input type="date" id="searchDateFrom">
                    <span>—</span>
                    <input type="date" id="searchDateTo">
                </div>
            </div>
            <div class="search-option">
                <label class="form-label">Подборки:</label>
                <div id="collectionCheckboxes" class="source-checkboxes"></div>
            </div>
            <div class="search-option">
                <label class="form-label">Или отдельные источники:</label>
                <div id="sourceCheckboxes" class="source-checkboxes"></div>
            </div>
        </div>
    </form>
</div>

<div id="searchStatus" class="search-status" style="display:none"></div>

<div id="searchResults" style="display:none">
    <div class="results-header">
        <div id="searchMeta" class="results-meta"></div>
        <div class="export-buttons">
            <button class="btn btn-sm" onclick="exportSearch('csv')">CSV</button>
            <button class="btn btn-sm" onclick="exportSearch('xlsx')">XLSX</button>
        </div>
    </div>

    <h3>История поиска</h3>
    <table class="data-table" id="historyTable" style="margin-bottom:24px">
        <thead>
            <tr>
                <th>Дата поиска</th>
                <th>Запрос</th>
                <th>Период</th>
                <th>Результатов</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <table class="data-table" id="searchTable">
        <thead>
            <tr>
                <th>Канал</th>
                <th>Сообщение</th>
                <th>Ник</th>
                <th>Телефон</th>
                <th>Дата и время</th>
                <th>Ссылка</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
let lastKeyword = '';
let lastSourceIds = '';
let collectionsData = [];
let sourcesData = [];

async function loadSources() {
    const [srcRes, collRes] = await Promise.all([
        fetch('/api/sources?is_active=true'),
        fetch('/api/collections')
    ]);
    sourcesData = await srcRes.json();
    collectionsData = await collRes.json();

    // Render collections checkboxes
    const collContainer = document.getElementById('collectionCheckboxes');
    collContainer.replaceChildren();
    if (collectionsData.length === 0) {
        const hint = document.createElement('span');
        hint.className = 'hint';
        hint.textContent = 'Нет подборок — создайте на странице Источники';
        collContainer.appendChild(hint);
    }
    collectionsData.forEach(c => {
        const label = document.createElement('label');
        label.className = 'source-checkbox';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = 'coll_' + c.id;
        cb.dataset.sourceIds = c.sources.map(s => s.id).join(',');
        cb.addEventListener('change', onCollectionToggle);
        label.appendChild(cb);
        const icon = document.createTextNode(' 📁 ' + c.name + ' (' + c.sources.length + ')');
        label.appendChild(icon);
        collContainer.appendChild(label);
    });

    // Render individual source checkboxes
    const container = document.getElementById('sourceCheckboxes');
    container.replaceChildren();
    sourcesData.forEach(s => {
        const label = document.createElement('label');
        label.className = 'source-checkbox';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = s.id;
        label.appendChild(cb);
        const text = document.createTextNode(' ' + s.title + (s.username ? ' (@' + s.username + ')' : ''));
        label.appendChild(text);
        container.appendChild(label);
    });
}

function onCollectionToggle(e) {
    const sourceIds = e.target.dataset.sourceIds.split(',').filter(Boolean);
    const checked = e.target.checked;
    sourceIds.forEach(id => {
        const cb = document.querySelector('#sourceCheckboxes input[value="' + id + '"]');
        if (cb) cb.checked = checked;
    });
}

function getSelectedSourceIds() {
    // Get from individual checkboxes
    const individual = document.querySelectorAll('#sourceCheckboxes input[type=checkbox]:checked');
    const ids = new Set(Array.from(individual).map(cb => cb.value));

    // Add from collection checkboxes
    const collCbs = document.querySelectorAll('#collectionCheckboxes input[type=checkbox]:checked');
    collCbs.forEach(cb => {
        cb.dataset.sourceIds.split(',').filter(Boolean).forEach(id => ids.add(id));
    });

    return Array.from(ids);
}

function buildSearchParams() {
    const params = new URLSearchParams();
    const keyword = document.getElementById('searchKeyword').value.trim();
    params.set('keyword', keyword);
    lastKeyword = keyword;

    const selected = getSelectedSourceIds();
    if (selected.length > 0) {
        params.set('source_ids', selected.join(','));
        lastSourceIds = selected.join(',');
    } else {
        lastSourceIds = '';
    }

    const dateFrom = document.getElementById('searchDateFrom').value;
    const dateTo = document.getElementById('searchDateTo').value;
    if (dateFrom) params.set('date_from', dateFrom + 'T00:00:00');
    if (dateTo) params.set('date_to', dateTo + 'T23:59:59');

    return params;
}

function createRow(r) {
    const tr = document.createElement('tr');

    const tdChannel = document.createElement('td');
    tdChannel.textContent = r.source_title || '—';
    tdChannel.style.whiteSpace = 'nowrap';
    tr.appendChild(tdChannel);

    const tdText = document.createElement('td');
    tdText.className = 'text-cell';
    const text = r.message_text || '';
    tdText.textContent = text.length > 200 ? text.substring(0, 200) + '...' : text;
    tdText.title = text;
    tr.appendChild(tdText);

    const tdAuthor = document.createElement('td');
    tdAuthor.textContent = r.author_username ? '@' + r.author_username : (r.author_display_name || '—');
    tr.appendChild(tdAuthor);

    const tdPhone = document.createElement('td');
    tdPhone.textContent = r.author_phone || '—';
    tr.appendChild(tdPhone);

    const tdDate = document.createElement('td');
    tdDate.textContent = new Date(r.posted_at).toLocaleString('ru');
    tdDate.style.whiteSpace = 'nowrap';
    tr.appendChild(tdDate);

    const tdLink = document.createElement('td');
    if (r.message_link) {
        const a = document.createElement('a');
        a.href = r.message_link;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = 'Открыть';
        tdLink.appendChild(a);
    } else {
        tdLink.textContent = '—';
    }
    tr.appendChild(tdLink);

    return tr;
}

document.getElementById('searchForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('searchBtn');
    const status = document.getElementById('searchStatus');
    const resultsDiv = document.getElementById('searchResults');

    btn.disabled = true;
    btn.textContent = 'Поиск...';
    status.textContent = 'Идёт поиск по всем каналам, это может занять 1-2 минуты...';
    status.style.display = 'block';
    resultsDiv.style.display = 'none';

    try {
        const params = buildSearchParams();
        const res = await fetch('/api/search?' + params.toString());
        const data = await res.json();

        const tbody = document.querySelector('#searchTable tbody');
        tbody.replaceChildren();
        data.results.forEach(r => tbody.appendChild(createRow(r)));

        document.getElementById('searchMeta').textContent =
            'Найдено: ' + data.total + ' совпадений по запросу "' + data.keyword + '"';

        resultsDiv.style.display = 'block';
        status.style.display = 'none';
        loadHistory();
    } catch (err) {
        status.textContent = 'Ошибка: ' + err.message;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Искать';
    }
});

function exportSearch(format) {
    const params = buildSearchParams();
    params.set('format', format);
    window.open('/api/search/export?' + params.toString());
}

// --- History ---

function createHistoryRow(h) {
    const tr = document.createElement('tr');

    const tdDate = document.createElement('td');
    tdDate.textContent = new Date(h.created_at).toLocaleString('ru');
    tdDate.style.whiteSpace = 'nowrap';
    tr.appendChild(tdDate);

    const tdKeyword = document.createElement('td');
    const b = document.createElement('b');
    b.textContent = h.keyword;
    tdKeyword.appendChild(b);
    tr.appendChild(tdKeyword);

    const tdPeriod = document.createElement('td');
    const parts = [];
    if (h.date_from) parts.push(h.date_from.substring(0, 10));
    if (h.date_to) parts.push(h.date_to.substring(0, 10));
    tdPeriod.textContent = parts.length ? parts.join(' — ') : 'весь период';
    tr.appendChild(tdPeriod);

    const tdCount = document.createElement('td');
    tdCount.textContent = h.results_count;
    tr.appendChild(tdCount);

    const tdActions = document.createElement('td');

    const viewBtn = document.createElement('button');
    viewBtn.className = 'btn btn-sm';
    viewBtn.textContent = 'Показать';
    viewBtn.addEventListener('click', () => loadSavedResults(h.id));
    tdActions.appendChild(viewBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-sm btn-danger';
    delBtn.textContent = 'Удалить';
    delBtn.addEventListener('click', () => deleteHistory(h.id));
    tdActions.appendChild(delBtn);

    tr.appendChild(tdActions);
    return tr;
}

async function loadHistory() {
    const res = await fetch('/api/search/history');
    const items = await res.json();
    const tbody = document.querySelector('#historyTable tbody');
    tbody.replaceChildren();
    items.forEach(h => tbody.appendChild(createHistoryRow(h)));
}

async function loadSavedResults(historyId) {
    const res = await fetch('/api/search/history/' + encodeURIComponent(historyId));
    const data = await res.json();

    const tbody = document.querySelector('#searchTable tbody');
    tbody.replaceChildren();
    (data.results || []).forEach(r => tbody.appendChild(createRow(r)));

    document.getElementById('searchMeta').textContent =
        'Сохранённый поиск "' + data.keyword + '" — ' + data.results_count + ' результатов (' +
        new Date(data.created_at).toLocaleString('ru') + ')';

    document.getElementById('searchResults').style.display = 'block';
}

async function deleteHistory(historyId) {
    if (!confirm('Удалить запись из истории?')) return;
    await fetch('/api/search/history/' + encodeURIComponent(historyId), {method: 'DELETE'});
    loadHistory();
}

loadSources();
loadHistory();
</script>
{% endblock %}
